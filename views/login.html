<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerFit - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e1e2f, #111); color: #fff; height: 100vh; display: flex; align-items: center; }
        .card { background-color: #2a2a40; border: none; border-radius: 15px; }
        .btn-custom { background-color: #ff4757; color: white; }
        .btn-custom:hover { background-color: #e84118; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-uppercase text-warning">PowerFit</h2>
                        <p class="text-muted">Control de Asistencia y Membresías</p>
                    </div>
                    <!-- Formulario de Login directo a Dashboard -->
                    <form action="dashboard.html" method="GET">
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" placeholder="admin@powerfit.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 fw-bold">INGRESAR</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
