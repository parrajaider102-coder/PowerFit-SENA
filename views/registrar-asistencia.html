<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerFit - Registrar Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Menú -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="dashboard.html">🏋️ PowerFit</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="registro-usuario.html">Registrar Usuario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="registrar-asistencia.html">Registrar Asistencia</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="login.html">Salir</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Formulario de Check-In -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 p-4 text-center">
                    <h3 class="fw-bold mb-3 text-success">⏱️ Control de Entrada (Asistencia)</h3>
                    <p class="text-muted">Ingrese el documento del miembro para marcar su ingreso físico.</p>
                    <form id="formAsistencia">
                        <div class="mb-4">
                            <input type="text" class="form-control form-control-lg text-center" placeholder="Número de Documento" required id="docAsistencia">
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">REGISTRAR ENTRADA</button>
                    </form>
                    <div id="resultadoAsistencia" class="mt-4 d-none alert alert-success" role="alert">
                        <strong>¡Ingreso Autorizado!</strong> Membresía Activa hasta el 25/07/2026.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formAsistencia').addEventListener('submit', function(e) {
            e.preventDefault();
            const resultado = document.getElementById('resultadoAsistencia');
            resultado.classList.remove('d-none');
            setTimeout(() => {
                resultado.classList.add('d-none');
                this.reset();
            }, 4000);
        });
    </script>
</body>
</html>
